apiVersion: v1
kind: Service

metadata:
  name: {{ include "task-manager.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app: task-manager-backend

spec:
  type: {{ .Values.backend.service.type }}

  selector:
    app: task-manager-backend

  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.port }}
