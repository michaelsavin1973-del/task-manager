apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration
spec:
  template:
    spec:
      containers:
      - name: alembic
        image: task-manager-backend:latest
        imagePullPolicy: Never
        command: ["python"]
        args: ["-m", "alembic", "upgrade", "head"]
        env:
        - name: PYTHONPATH
          value: /app
      restartPolicy: Never
  backoffLimit: 3
