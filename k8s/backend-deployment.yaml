apiVersion: apps/v1
kind: Deployment

metadata:
  name: task-manager-backend
  namespace: task-manager

  annotations:
    kubernetes.io/change-cause: "Added resource requests and limits"
spec:
  replicas: 2

  selector:
    matchLabels:
      app: task-manager-backend

  template:
    metadata:
      labels:
        app: task-manager-backend

    spec:
      containers:
      - name: backend
        image: task-manager-backend:latest
        imagePullPolicy: Never

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        ports:
        - containerPort: 5000

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5

        envFrom:
        - configMapRef:
            name: backend-config

        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD

