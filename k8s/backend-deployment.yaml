apiVersion: apps/v1
kind: Deployment

metadata:
  name: task-manager-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: task-manager-backend

  template:
    metadata:
      labels:
        app: task-manager-backend

    spec:
      containers:
      - name: backend
        image: task-manager-backend:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 5000

        env:
        - name: DATABASE_URL
          value: postgresql://admin:secret@postgres-service:5432/taskdb
