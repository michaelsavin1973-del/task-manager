apiVersion: apps/v1
kind: Deployment

metadata:
  name: task-manager-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: task-manager-backend

  template:
    metadata:
      labels:
        app: task-manager-backend

    spec:
      containers:
      - name: backend
        image: task-manager-backend:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 5000

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5

        env:
        - name: DB_USER
          value: admin

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD

        - name: DB_HOST
          value: postgres-service

        - name: DB_NAME
          value: taskdb
